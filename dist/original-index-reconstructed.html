<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Youth Soccer Formations or Systems of Play</title>
<style>
:root {
--bg: #f7f9fc;
--panel: #ffffff;
--panel-2: #f1f5f9;
--text: #102033;
--muted: #5f7288;
--line: #d9e2ec;
--shadow: 0 10px 28px rgba(16, 32, 51, 0.08);
--radius: 18px;
--gk: #d4a017;
--def: #2563eb;
--mid: #16a34a;
--fwd: #dc2626;
--selected: #0f766e;
--selected-soft: #e6fffb;
--maxw: 1400px;
}
* { box-sizing: border-box; }
html, body {
margin: 0; padding: 0; background: var(--bg); color: var(--text);
font-family: Inter, ui-sans-serif, system-ui, -apple-system, sans-serif; min-height: 100%;
}
body { padding: 18px; }
button { font: inherit; cursor: pointer; border: none; background: none; }
.app { max-width: var(--maxw); margin: 0 auto; }

/* Topbar */
.topbar { display: grid; grid-template-columns: 1fr auto; gap: 16px; align-items: start; margin-bottom: 18px; }
.brand { background: var(--panel); border: 1px solid var(--line); border-radius: 22px; box-shadow: var(--shadow); padding: 20px; }
.brand-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.brand h1 { margin: 0; font-size: 28px; line-height: 1.1; font-weight: 900; letter-spacing: -0.02em; }
.version { padding: 6px 10px; border-radius: 999px; background: var(--panel-2); color: var(--muted); border: 1px solid var(--line); font-size: 12px; font-weight: 800; }
.eyebrow { margin-top: 10px; font-size: 12px; font-weight: 800; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted); }
.selection-banner { margin-top: 14px; display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
.selection-badge { display: inline-flex; align-items: center; gap: 8px; background: var(--selected-soft); border: 1px solid #bde9e3; color: var(--selected); padding: 10px 12px; border-radius: 999px; font-weight: 800; font-size: 14px; }

/* Controls */
.controls { display: flex; flex-direction: column; gap: 12px; min-width: 360px; }
.control-group { background: var(--panel); border: 1px solid var(--line); border-radius: 18px; box-shadow: var(--shadow); padding: 10px; }
.control-title { font-size: 11px; font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); padding: 2px 6px 8px; }
.segmented { display: flex; gap: 8px; flex-wrap: wrap; }
.segment-btn { flex: 1; padding: 12px 14px; border-radius: 12px; border: 1px solid var(--line); background: var(--panel-2); color: var(--muted); font-weight: 800; transition: 0.15s ease; text-align: center; }
.segment-btn.active { background: #0f766e; border-color: #0f766e; color: #fff; }

.screen { display: block; } .hidden { display: none !important; }

/* Hero */
.hero { background: var(--panel); border: 1px solid var(--line); border-radius: 24px; box-shadow: var(--shadow); padding: 22px; margin-bottom: 18px; }
.hero h2 { margin: 0 0 8px; font-size: 32px; line-height: 1.1; font-weight: 900; }
.hero p { margin: 0; color: var(--muted); line-height: 1.65; max-width: 860px; }

/* Grid/cards */
.formation-grid { display: grid; grid-template-columns: repeat(12, minmax(0, 1fr)); gap: 18px; }
.formation-card { grid-column: span 6; background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; transition: 0.16s ease; cursor: pointer; }
.formation-card:hover { transform: translateY(-2px); }
.formation-card.selected { border-color: #7fd5ca; box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.08), var(--shadow); }
.card-top { display: flex; justify-content: space-between; gap: 10px; padding: 16px 18px 6px; }
.chip-row { display: flex; flex-wrap: wrap; gap: 8px; }
.chip { display: inline-flex; align-items: center; gap: 8px; padding: 7px 10px; border-radius: 999px; border: 1px solid var(--line); background: var(--panel-2); color: var(--muted); font-size: 12px; font-weight: 900; }
.chip .dot { width: 10px; height: 10px; border-radius: 999px; }
.current-badge { padding: 8px 10px; border-radius: 999px; background: #ecfdf5; color: #047857; border: 1px solid #bbf7d0; font-size: 12px; font-weight: 900; }
.card-body { padding: 0 18px 18px; }
.formation-name { margin: 8px 0 4px; font-size: 30px; font-weight: 900; }
.formation-style { margin: 0 0 14px; color: #0f766e; font-weight: 800; font-size: 15px; }
.best-for { margin: 0 0 16px; color: var(--muted); line-height: 1.65; }
.formation-layout { display: grid; grid-template-columns: 280px 1fr; gap: 16px; align-items: start; }
.mini-pitch-panel, .content-panel, .coach-panel, .player-info-panel, .pitch-panel { background: var(--panel-2); border: 1px solid var(--line); border-radius: 16px; padding: 16px; }
.subheading { margin: 0 0 12px; font-size: 13px; font-weight: 900; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
.columns { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.sublist h4 { margin: 0 0 10px; font-size: 15px; color: var(--text); }
.sublist ul { margin: 0; padding-left: 18px; color: var(--muted); line-height: 1.55; }
.sublist li + li { margin-top: 8px; }

/* Views shell */
.view-shell { background: var(--panel); border: 1px solid var(--line); border-radius: 24px; box-shadow: var(--shadow); }
.view-header { padding: 22px; border-bottom: 1px solid var(--line); display: flex; justify-content: space-between; flex-wrap: wrap; gap: 16px; }
.view-header h2 { margin: 0; font-size: 30px; font-weight: 900; }
.view-header p { margin: 8px 0 0; color: var(--muted); line-height: 1.65; max-width: 800px; }
.back-btn { background: var(--panel-2); border: 1px solid var(--line); color: var(--text); padding: 10px 14px; border-radius: 12px; font-weight: 800; }
.view-content { padding: 22px; }
.player-view-grid, .coach-view-grid { display: grid; grid-template-columns: 430px 1fr; gap: 18px; align-items: start; }

/* Pitch + click fix */
.field { position: relative; width: 100%; aspect-ratio: 0.72 / 1; background: linear-gradient(180deg, #b7efc5 0%, #8fdb9f 100%); border: 2px solid #6abf7d; border-radius: 22px; overflow: hidden; margin-bottom: 14px; }
.field-mark { position: absolute; pointer-events: none; z-index: 1; border: 2px solid rgba(255,255,255,0.9); }
.half-line { left: 0; right: 0; top: 50%; transform: translateY(-50%); border-bottom: none; border-left: none; border-right: none; }
.center-circle { left: 50%; top: 50%; width: 86px; height: 86px; border-radius: 50%; transform: translate(-50%, -50%); }
.box { position: absolute; left: 50%; transform: translateX(-50%); width: 54%; height: 14%; pointer-events: none; z-index: 1; }
.box.top { top: 0; border-top: none; }
.box.bottom { bottom: 0; border-bottom: none; }
.field-player { position: absolute; width: 54px; height: 54px; transform: translate(-50%, -50%); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 900; color: #fff; border: 2px solid rgba(255,255,255,0.85); box-shadow: 0 6px 16px rgba(16,32,51,0.16); z-index: 5; }
.field-player.clickable { cursor: pointer; transition: transform 0.12s ease; }
.field-player.clickable:hover { transform: translate(-50%, -50%) scale(1.06); }
.field-player.selected { box-shadow: 0 0 0 4px rgba(15,118,110,0.18); z-index: 6; }
.role-gk { background: var(--gk); } .role-def { background: var(--def); } .role-mid { background: var(--mid); } .role-fwd { background: var(--fwd); }
.key { display: flex; flex-wrap: wrap; gap: 10px; }
.key-item { display: inline-flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: 999px; background: #fff; border: 1px solid var(--line); color: var(--muted); font-size: 12px; font-weight: 900; }
.key-swatch { width: 12px; height: 12px; border-radius: 50%; }

.position-header { margin-bottom: 14px; }
.position-header h3 { margin: 0 0 8px; font-size: 24px; font-weight: 900; }
.position-meta { display: flex; gap: 10px; flex-wrap: wrap; }
.meta-pill { padding: 7px 10px; border-radius: 999px; background: #fff; border: 1px solid var(--line); font-size: 12px; font-weight: 900; }

.detail-block + .detail-block { margin-top: 18px; }
.detail-block h4 { margin: 0 0 10px; font-size: 18px; }
.detail-block p { margin: 0; color: var(--muted); line-height: 1.7; }
.detail-block ul { margin: 0; padding-left: 20px; color: var(--muted); line-height: 1.65; }
.detail-block li + li { margin-top: 8px; }

.moment-tabs, .coach-tabs { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
.tab-btn { padding: 10px 12px; border-radius: 10px; background: #fff; border: 1px solid var(--line); color: var(--muted); font-weight: 800; }
.tab-btn.active { background: var(--selected-soft); border-color: #bde9e3; color: var(--selected); }

.coach-toolbar { margin-bottom: 18px; }
.accordion { display: flex; flex-direction: column; gap: 12px; }
.accordion-item { border: 1px solid var(--line); border-radius: 16px; overflow: hidden; background: var(--panel-2); }
.accordion-head { width: 100%; text-align: left; padding: 16px; display: flex; justify-content: space-between; align-items: center; }
.accordion-head-main { display: flex; flex-direction: column; gap: 6px; }
.accordion-title { font-weight: 900; font-size: 17px; color: var(--text); }
.accordion-subtitle { color: var(--muted); font-size: 14px; }
.accordion-time { color: var(--selected); font-size: 12px; font-weight: 900; }
.accordion-icon { font-size: 22px; font-weight: 900; color: var(--muted); }
.accordion-body { padding: 16px; border-top: 1px solid var(--line); background: #fff; }

table { width: 100%; border-collapse: collapse; margin-top: 10px; background: #fff; border-radius: 12px; border: 1px solid var(--line); overflow: hidden; }
th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--line); font-size: 14px; }
th { background: var(--panel-2); font-weight: 900; }
tr:last-child td { border-bottom: none; }
.svg-wrap { margin-top: 12px; background: #fff; border: 1px solid var(--line); border-radius: 16px; padding: 10px; }

/* Coach View Components */

.coach-section {
  margin-bottom: 20px;
}

.coach-section h4 {
  margin: 0 0 10px;
  font-size: 18px;
  font-weight: 900;
}

.drill-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.drill-item,
.principle-card,
.step-card {
  background: #fff;
  border: 1px solid var(--line);
  border-radius: 12px;
  padding: 14px;
}


.coach-section ul {
  margin: 0;
  padding-left: 20px;
  color: var(--muted);
  line-height: 1.65;
}

.coach-section li + li {
  margin-top: 6px;
}


.drill-item h5,
.principle-card h5,
.step-card h5 {
  margin: 0 0 8px;
  font-size: 15px;
  font-weight: 900;
  color: var(--text);
}

.drill-item p,
.principle-card p,
.step-card p {
  margin: 0;
  color: var(--muted);
  line-height: 1.6;
}

.tiny-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 10px;
}

.tiny-badge {
  display: inline-flex;
  align-items: center;
  padding: 5px 10px;
  border-radius: 999px;
  background: var(--panel-2);
  border: 1px solid var(--line);
  color: var(--muted);
  font-size: 11px;
  font-weight: 800;
}

.principle-card {
  border-left: 4px solid #dc2626;
}

.step-card {
  border-left: 4px solid #16a34a;
}


@media (max-width: 1180px) {
.formation-card { grid-column: span 12; }
.player-view-grid, .coach-view-grid, .formation-layout { grid-template-columns: 1fr; }
.topbar { grid-template-columns: 1fr; }
}
@media (max-width: 760px) {
body { padding: 12px; }
.hero, .brand, .view-header, .view-content { padding: 18px; }
.hero h2, .view-header h2 { font-size: 24px; }
.columns { grid-template-columns: 1fr; }
.field-player { width: 44px; height: 44px; font-size: 9px; }
}
</style>
</head>
<body>
<div class="app">
<div class="topbar">
<div class="brand">
<div class="brand-row">
<h1>⚽ Youth Soccer Formations or Systems of Play</h1>
<span class="version">003.053</span>
</div>
<div class="eyebrow">Formation Select</div>
<div class="selection-banner">
<span class="selection-badge" id="headerFormatBadge">7v7</span>
<span class="selection-badge" id="headerFormationBadge">—</span>
<span class="selection-badge" id="headerViewBadge">Formations View</span>
</div>
</div>

<div class="controls">
<div class="control-group">
<div class="control-title">Formation Format</div>

<div class="segmented">
<button class="segment-btn active" id="btnFormat7v7"
        onclick="setFormat('7v7')">7v7</button>

<button class="segment-btn" id="btnFormat9v9"
        onclick="setFormat('9v9')">9v9</button>

<button class="segment-btn" id="btnFormat11v11"
        onclick="setFormat('11v11')">11v11</button>
</div>

</div>

<div class="control-group">
<div class="control-title">View</div>
<div class="segmented">
<button class="segment-btn active" id="btnViewFormations" onclick="setView('formations')">Formations</button>
<button class="segment-btn" id="btnViewPlayer" onclick="setView('player')">👤 Player</button>
<button class="segment-btn" id="btnViewCoach" onclick="setView('coach')">📋 Coach</button>
</div>
</div>
</div>
</div>

<section id="screen-formations" class="screen">
<div class="hero">
<h2>Choose Your Formation</h2>
<p>Select a formation to see the Formation View, Player View, or Coach View tailored specifically for it.</p>
</div>
<div id="formationGrid" class="formation-grid"></div>
</section>

<section id="screen-player" class="screen hidden">
<div class="view-shell">
<div class="view-header">
<div><h2 id="playerViewTitle"></h2><p id="playerViewSubtitle"></p></div>
<button class="back-btn" onclick="setView('formations')">â† Back to Formations View</button>
</div>
<div class="view-content" id="playerViewContent"></div>
</div>
</section>

<section id="screen-coach" class="screen hidden">
<div class="view-shell">
<div class="view-header">
<div><h2 id="coachViewTitle"></h2><p id="coachViewSubtitle"></p></div>
<button class="back-btn" onclick="setView('formations')">â† Back to Formations View</button>
</div>
<div class="view-content" id="coachViewContent"></div>
</div>
</section>
</div>

<script>
const ROLE_META = {
gk: { label: 'GK', long: 'Goalkeeper', color: '#d4a017' },
def: { label: 'DEF', long: 'Defender', color: '#2563eb' },
mid: { label: 'MID', long: 'Midfielder', color: '#16a34a' },
fwd: { label: 'FWD', long: 'Forward', color: '#dc2626' }
};

const triggerNames = [
'Our GK has the ball',
'We win the ball in our own half',
'We win the ball in their half',
'They have the ball - defensive block',
'Long ball over the top',
'Corner Kick - defending',
'Corner Kick - attacking'
];

function mkPositionDetails(name, roleLabel, formationName) {
return {
yourJob: `In the ${formationName}, the ${name} must understand space, support angles, and timing. This ${roleLabel.toLowerCase()} role should stay connected to nearby teammates, make the field bigger in possession when needed, and become compact immediately when the team loses the ball.`,
keyMoments: {
lost: `When we lost the ball, the ${name} must react first by recovering into the team shape, protecting the most dangerous central space, and communicating the nearest pressure or cover responsibility.`,
won: `When we won the ball, the ${name} should scan early, choose the safest forward option when available, and help the team either secure possession or attack quickly depending on the game moment.`,
gk: `When their GK has it, the ${name} should take up a position that helps close central lanes, cues teammates around the press, and prepares to jump if the ball travels into the nearest zone.`
},
remember: [
`Stay connected to the nearest line in the ${formationName}.`,
`Scan before the ball arrives so your first action is clear.`,
`React quickly on transitions - shape first, then pressure.`,
`Use your body shape to see both the ball and the next option.`
]
};
}

function mkSessionPlans(formationName) {
return Array.from({ length: 8 }, (_, i) => ({
title: `Session ${i + 1} - ${formationName} Team Function`,
subtitle: `Teach a key game model behavior inside the ${formationName} through progressive, position-specific work.`,
time: `${60 + (i % 3) * 10} min`,
objective: `Build shared understanding of spacing, timing, and decision-making in the ${formationName}, with special focus on transition moments, support angles, and role clarity.`,
drills: [
{ title: 'Pattern Play Warmup', time: '10 min', players: 'Full squad', opposition: 'Unopposed', desc: `Rehearse starting positions and passing lanes in the ${formationName}.` },
{ title: 'Shape Retention Game', time: '12 min', players: '7v6 / 8v7', opposition: 'Passive to live', desc: 'Keep shape while circulating and finding the free player.' },
{ title: 'Transition Wave', time: '12 min', players: 'Units', opposition: 'Live', desc: 'Train immediate reactions after winning or losing the ball.' },
{ title: 'Positional Functional Game', time: '14 min', players: 'Lines/units', opposition: 'Live', desc: 'Coach the specific responsibilities of each line in the system.' },
{ title: 'Conditioned Scrimmage', time: '16 min', players: 'Team', opposition: 'Live', desc: `Reward execution of the core principles of the ${formationName}.` }
]
}));
}

function makeGenericTriggers(formation) {
return triggerNames.map(trigger => ({
title: trigger,
cue: `Coach call: "${trigger.toUpperCase()}"`,
summary: `On "${trigger}," the team in the ${formation.name} should react together, with every line moving on the same cue and each position understanding its immediate job before the next action.`,
actions: formation.positions.map(p => ({
position: p.label,
action: `${p.label} adjusts based on the cue, keeps compact spacing in the ${formation.name}, and performs the first role-specific action with urgency and clarity.`
}))
}));
}

function makeGenericBuildout(formation) {
return [
{
title: `${formation.name} Pattern 1 - Primary Buildout`,
trigger: `Use when the first line of pressure allows a clean first pass out of the back in the ${formation.name}.`,
objective: `Create a stable first phase, draw pressure, and progress into the next line with balance and support.`,
steps: formation.positions.map(p => `${p.label} takes the role-appropriate starting position and moves in sequence as the ball progresses.`),
coaching: formation.positions.map(p => ({
position: p.label,
point: `${p.label} should scan early, arrive on time, and keep body shape open to the next action.`
}))
},
{
title: `${formation.name} Pattern 2 - Wide Release`,
trigger: `Use when the opponent narrows and the outside lane becomes available.`,
objective: `Attract pressure centrally, then release into the wide lane with supporting movement around the ball.`,
steps: formation.positions.map(p => `${p.label} adjusts to support the ball-side triangle and prepare the next pass or run.`),
coaching: formation.positions.map(p => ({
position: p.label,
point: `${p.label} should understand whether the next action is to support short, receive wide, or run beyond.`
}))
},
{
title: `${formation.name} Pattern 3 - Vertical Entry`,
trigger: `Use when a central lane opens and a receiving player can take the next line.`,
objective: `Break a line with control and connect into advanced support without losing rest-defense balance.`,
steps: formation.positions.map(p => `${p.label} must move on the pass, not after it, so the pattern stays synchronized.`),
coaching: formation.positions.map(p => ({
position: p.label,
point: `${p.label} should move with timing and avoid arriving too early into a marked space.`
}))
}
];
}

function makeGenericDefensiveBlock(formation) {
return {
shapeDescription: `In the ${formation.name}, the team defends by protecting the center first, staying connected between lines, and using role clarity to decide who pressures, who covers, and who balances.`,
roleSummary: formation.positions.map(p => `${p.label}: Defend the immediate zone with compact distances, communicate early, and recover quickly into the structure.`),
principles: [
'Protect the central lane first before chasing wide pressure.',
'Keep compact distances between the lines at all times.',
'The nearest player pressures; teammates provide cover and balance.',
'Body shape should show play into less dangerous areas.',
'React immediately when the first press is broken.',
'Win the ball if possible; delay and recover if not.'
],
sessionPlan: [
{ title: 'Step 1', text: `Walk through the ${formation.name} defensive shape and freeze distances between players.` },
{ title: 'Step 2', text: 'Coach who presses, who covers, and who balances in each zone.' },
{ title: 'Step 3', text: 'Add the ball and train shifting across the field as a unit.' },
{ title: 'Step 4', text: 'Introduce live transitions after turnovers.' },
{ title: 'Step 5', text: 'Finish with a conditioned game rewarding compact defending and communication.' }
]
};
}

function mkCurriculum(formationName) {
return Array.from({ length: 8 }, (_, i) => ({
week: `Week ${i + 1}`,
title: `${formationName} Learning Block ${i + 1}`,
focus: [
`Role clarity inside the ${formationName}`,
'Transition reactions and immediate shape recovery',
'Support angles and communication by line'
],
phrases: [
'Shape first, then pressure.',
'See the next action before the ball arrives.',
'Move with the pass, not after the pass.'
],
notes: `This week reinforces a core behavior in the ${formationName}. The coaching priority is to simplify player decision-making while repeating the same pictures until the team recognizes them naturally in game play.`
}));
}

/* App state */
const formations = { "7v7": [], "9v9": [], "11v11": [] };

const state = {
format: '7v7',
selectedFormationId: null,
view: 'formations',
selectedPositionLabel: null,
keyMomentTab: 'lost',
coachSection: 'sessionPlans',
openCoachItem: 0
};

function getCurrentFormations() { return formations[state.format] || []; }
function getSelectedFormation() {
const list = getCurrentFormations();
return list.find(f => f.id === state.selectedFormationId) || list[0] || null;
}
function setDefaultFormationForFormat(fmt) {
const list = formations[fmt] || [];
const preferred = list.find(f => f.current) || list[0] || null;
state.selectedFormationId = preferred ? preferred.id : null;
state.selectedPositionLabel = null;
state.keyMomentTab = 'lost';
state.coachSection = 'sessionPlans';
state.openCoachItem = 0;
}

function updateHeader() {
const f = getSelectedFormation();
document.getElementById('headerFormatBadge').textContent = state.format;
document.getElementById('headerFormationBadge').textContent = f ? f.name : '—';
document.getElementById('headerViewBadge').textContent =
state.view === 'formations' ? 'Formations View' :
state.view === 'player' ? 'Player View' : 'Coach View';

document.getElementById('btnFormat7v7').classList.toggle('active', state.format === '7v7');
document.getElementById('btnFormat9v9').classList.toggle('active', state.format === '9v9');
document.getElementById('btnFormat11v11').classList.toggle('active', state.format === '11v11');

document.getElementById('btnViewFormations').classList.toggle('active', state.view === 'formations');
document.getElementById('btnViewPlayer').classList.toggle('active', state.view === 'player');
document.getElementById('btnViewCoach').classList.toggle('active', state.view === 'coach');
}

function setFormat(fmt) {
if (state.format !== fmt) {
state.format = fmt;
setDefaultFormationForFormat(fmt);
}
render();
}
function setView(view) {
state.view = view;
if (view === 'player') {
const f = getSelectedFormation();
if (f && !state.selectedPositionLabel && f.positions.length) {
state.selectedPositionLabel = f.positions[0].label;
}
}
render();
}
function selectFormation(id) { state.selectedFormationId = id; state.selectedPositionLabel = null; state.keyMomentTab = 'lost'; state.openCoachItem = 0; render(); }

function setCoachSection(section) { state.coachSection = section; state.openCoachItem = 0; renderCoachView(); }
function toggleCoachItem(index) { state.openCoachItem = state.openCoachItem === index ? -1 : index; renderCoachView(); }
function roleClass(role) { return `role-${role}`; }

function renderField(formation, clickable = false, selectedPosition = null) {
return `

<div class="field-mark half-line"></div>
<div class="field-mark center-circle"></div>

<div class="box bottom"></div>

${clickable ? `onclick="selectPosition('${p.label}')"` : ''}
title="${p.label} - ${p.full}"
>${p.label}</button>
`).join('')}
</div>
`;
}

function renderKey(counts) {

function renderPlayerView() {
const f = getSelectedFormation();
const content = document.getElementById('playerViewContent');
if (!f) { content.innerHTML = ''; return; }
const pos = f.positions.find(p => p.label === state.selectedPositionLabel) || null;
document.getElementById('playerViewTitle').textContent = `${state.format} ${f.name} - Player View`;
document.getElementById('playerViewSubtitle').textContent = `${f.style} | Click any position circle on the field to see detailed role information, key moments, and coaching points.`;

const right = !pos ? `
<div class="player-info-panel">
<div class="detail-block"><h4>Select a Position</h4>
<p class="placeholder-note">Click any position circle on the field to see detailed role information, key moments, and coaching points.</p></div>
</div>
` : (() => {
const d = f.playerDetails[pos.label]; const role = ROLE_META[pos.role];
const mt = state.keyMomentTab === 'lost' ? d.keyMoments.lost : state.keyMomentTab === 'won' ? d.keyMoments.won : d.keyMoments.gk;
return `
<div class="player-info-panel">
<div class="position-header">
<h3>${pos.label} - ${pos.full}</h3>

<button class="tab-btn ${state.keyMomentTab === 'won' ? 'active' : ''}" onclick="setKeyMoment('won')">We Won the Ball</button>

function coachingTable(formation, pointByLabel) {

position: p.label,

}));
